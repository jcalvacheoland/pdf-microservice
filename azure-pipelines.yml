trigger:
- main

variables:
  dockerRegistryServiceConnection: 'pdf-acr-connection'
  imageRepository: 'pdf-oland'
  containerRegistry: 'coizadoroland.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  appServiceName: 'pdf-oland'
  azureSubscription: 'pdf-service'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: DockerBuild
    displayName: 'Build and Push Image'
    steps:
    - checkout: self

    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Push Docker Image'
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployPdf
    displayName: 'Deploy PDF Service'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy Container'
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(appServiceName)
              containers: '$(containerRegistry)/$(imageRepository):$(tag)'
